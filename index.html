<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>合成大卜卜 H5</title>
  <style>
    :root {
      --ink: #2a160b;
      --wood-dark: #6f3b18;
      --wood: #b96f2c;
      --wood-light: #e3a84e;
      --cream: #ffe6a6;
      --grass: #5fb344;
      --grass-dark: #2f7c3a;
      --sky: #8fd9ff;
      --soil: #b9783a;
      --red: #d94b38;
      --green: #2f9f4a;
      --shadow: 4px 4px 0 var(--ink);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      color: var(--ink);
      font-family: "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
      background: #79c65b;
    }

    body {
      image-rendering: pixelated;
      background:
        linear-gradient(#7fd7ff 0 26%, #b6f3bb 26% 35%, transparent 35%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 4px, transparent 4px 16px),
        linear-gradient(180deg, #71c853 0%, #4fa846 100%);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 18px));
      height: 100dvh;
      margin: 0 auto;
      padding: 12px 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .title-board, .stat, .panel, .next-card, .modal, .btn {
      border: 4px solid var(--ink);
      box-shadow: var(--shadow);
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.12) 0 10px, transparent 10px 22px),
        linear-gradient(180deg, var(--wood-light), var(--wood));
    }

    .title-board {
      position: relative;
      padding: 10px 18px 12px;
      border-radius: 6px;
      width: fit-content;
      min-width: min(560px, 100%);
    }

    .title-board:before,
    .title-board:after {
      content: "";
      position: absolute;
      top: -12px;
      width: 18px;
      height: 18px;
      border: 4px solid var(--ink);
      background: #5a3217;
      border-radius: 50%;
    }

    .title-board:before { left: 18px; }
    .title-board:after { right: 18px; }

    h1 {
      margin: 0;
      color: #ffe66f;
      font-size: clamp(28px, 4vw, 48px);
      line-height: .95;
      letter-spacing: 1px;
      text-shadow: 3px 3px 0 var(--ink);
    }

    .subtitle {
      margin-top: 5px;
      color: #fff4c3;
      font-size: 14px;
      font-weight: 800;
      text-shadow: 2px 2px 0 rgba(42, 22, 11, .7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat {
      min-width: 82px;
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat span {
      display: block;
      color: #fff4c3;
      font-size: 12px;
      font-weight: 1000;
      text-shadow: 1px 1px 0 var(--ink);
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      color: #fff;
      font-size: 24px;
      line-height: 1;
      text-shadow: 2px 2px 0 var(--ink);
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 10px;
    }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 4px solid var(--ink);
      border-radius: 8px;
      box-shadow: 8px 8px 0 rgba(42, 22, 11, .32);
      background:
        linear-gradient(rgba(70, 42, 18, .06), rgba(70, 42, 18, .18)),
        url("assets/farm-background.jpg") center / cover no-repeat;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 12px;
    }

    .farm-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0 38%, rgba(42, 22, 11, .18) 100%);
    }

    .farm-bg:before {
      display: none;
    }

    .farm-bg:after {
      display: none;
    }

    .brief {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .brief-text, .pill {
      border: 4px solid var(--ink);
      border-radius: 6px;
      background: #ffe6a6;
      box-shadow: 3px 3px 0 rgba(42, 22, 11, .65);
    }

    .brief-text {
      min-width: 0;
      padding: 9px 12px;
    }

    .brief-text b {
      display: block;
      margin-bottom: 2px;
      font-size: 15px;
    }

    .brief-text span {
      display: block;
      color: #5c3c1e;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      align-self: start;
      padding: 9px 10px;
      color: #fff;
      background: #d94b38;
      font-weight: 1000;
      text-shadow: 2px 2px 0 var(--ink);
      white-space: nowrap;
    }

    .play-wrap {
      position: relative;
      z-index: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: auto 170px;
      justify-content: center;
      align-content: center;
      gap: 18px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #gameCanvas {
      width: 420px;
      height: 640px;
      max-width: 100%;
      border: 5px solid var(--ink);
      border-radius: 4px;
      background: #b9783a;
      box-shadow: 8px 8px 0 rgba(42, 22, 11, .35);
    }

    .side-stack {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .next-card {
      border-radius: 6px;
      padding: 10px;
    }

    .next-card b {
      display: block;
      color: #fff4c3;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 var(--ink);
    }

    #nextCanvas {
      width: 130px;
      height: 130px;
      border: 4px solid var(--ink);
      background: #ffe6a6;
      box-shadow: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      border-radius: 6px;
      padding: 9px 12px;
      color: #fff4c3;
      font-weight: 1000;
      text-shadow: 2px 2px 0 var(--ink);
      cursor: pointer;
      transition: transform .08s steps(1), box-shadow .08s steps(1);
    }

    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .btn.primary {
      background: linear-gradient(180deg, #f7b345, #c96a24);
    }

    .btn.green {
      background: linear-gradient(180deg, #65c85c, #2f8f3f);
    }

    aside {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel {
      border-radius: 6px;
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: #fff4c3;
      font-size: 18px;
      text-shadow: 2px 2px 0 var(--ink);
    }

    .rules {
      display: grid;
      gap: 8px;
    }

    .rule {
      padding: 9px;
      border: 3px solid var(--ink);
      border-radius: 4px;
      background: #ffe6a6;
      color: #5c3c1e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    .rule b {
      display: block;
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 2px;
    }

    .log {
      height: 116px;
      overflow: hidden;
      display: grid;
      align-content: start;
      gap: 6px;
      color: #5c3c1e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .log div {
      border-left: 5px solid #2f8f3f;
      padding: 7px;
      background: #ffe6a6;
      border-radius: 2px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(48, 91, 48, .42);
      backdrop-filter: blur(2px);
    }

    .overlay[hidden] {
      display: none;
    }

    .modal {
      width: min(540px, 100%);
      border-radius: 6px;
      padding: 22px;
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 10px;
      color: #ffe66f;
      font-size: clamp(34px, 6vw, 62px);
      line-height: .9;
      text-shadow: 3px 3px 0 var(--ink);
    }

    .modal p {
      margin: 0 auto 16px;
      max-width: 430px;
      color: #fff4c3;
      line-height: 1.65;
      font-weight: 900;
      text-shadow: 2px 2px 0 rgba(42, 22, 11, .7);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      min-width: 220px;
      max-width: min(560px, calc(100vw - 24px));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      border: 4px solid var(--ink);
      border-radius: 6px;
      padding: 11px 14px;
      background: #ffe66f;
      color: var(--ink);
      font-weight: 1000;
      text-align: center;
      transition: opacity .16s ease, transform .16s ease;
      pointer-events: none;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 940px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      header, main {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .stage {
        min-height: 760px;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: calc(100vw - 10px);
        padding-top: 8px;
      }

      .title-board {
        min-width: 100%;
      }

      .subtitle, .brief-text span {
        white-space: normal;
      }

      .stat {
        min-width: calc(50% - 4px);
      }

      .brief {
        grid-template-columns: 1fr;
      }

      .play-wrap {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      #gameCanvas {
        width: min(92vw, 380px);
        height: auto;
      }

      .side-stack {
        width: min(380px, 100%);
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-board">
        <h1>合成大卜卜</h1>
        <div class="subtitle">把果实丢进收获箱，相同果实成熟合体，最后收获最大卜卜。</div>
      </div>
      <div class="stats">
        <div class="stat"><span>收获分</span><strong id="scoreText">0</strong></div>
        <div class="stat"><span>最大果</span><strong id="maxText">01</strong></div>
        <div class="stat"><span>成熟</span><strong id="mergeText">0</strong></div>
        <div class="stat"><span>最佳</span><strong id="bestText">0</strong></div>
      </div>
    </header>

    <main>
      <section class="stage">
        <div class="farm-bg"></div>
        <div class="brief">
          <div class="brief-text">
            <b>今日收获：合成最大卜卜</b>
            <span>移动落点，点击投放。两个同级果实碰到会成熟为下一级。</span>
          </div>
          <div class="pill" id="dangerText">箱口警戒线</div>
        </div>

        <div class="play-wrap">
          <canvas id="gameCanvas" width="420" height="640" aria-label="合成大卜卜游戏区域"></canvas>
          <div class="side-stack">
            <div class="next-card">
              <b>下个果实</b>
              <canvas id="nextCanvas" width="130" height="130"></canvas>
            </div>
            <div class="next-card">
              <b>农具</b>
              <div class="actions">
                <button class="btn" id="leftBtn">左移</button>
                <button class="btn green" id="dropBtn">投放</button>
                <button class="btn" id="rightBtn">右移</button>
                <button class="btn" id="restartBtn">重开</button>
              </div>
            </div>
          </div>
        </div>

        <div class="overlay" id="overlay">
          <div class="modal">
            <h2 id="modalTitle">合成大卜卜</h2>
            <p id="modalText">把果实投进木箱。相同果实碰到一起会成熟升级，箱口上方堆太久就会爆仓。</p>
            <button class="btn primary" id="startBtn">开始收获</button>
          </div>
        </div>
      </section>

      <aside>
        <section class="panel">
          <h2>农场规则</h2>
          <div class="rules">
            <div class="rule"><b>投放</b>鼠标/手指移动落点，点击或空格把果实丢进收获箱。</div>
            <div class="rule"><b>成熟</b>两个同级果实碰撞，会合成下一级，越大越占空间。</div>
            <div class="rule"><b>爆仓</b>果实稳定堆过箱口警戒线，会触发倒计时结束。</div>
          </div>
        </section>

        <section class="panel">
          <h2>农场广播</h2>
          <div class="log" id="log">
            <div>收获箱已摆好，第一批果实正在排队。</div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const nextCanvas = document.getElementById("nextCanvas");
    const nextCtx = nextCanvas.getContext("2d");
    const ui = {
      score: document.getElementById("scoreText"),
      max: document.getElementById("maxText"),
      merge: document.getElementById("mergeText"),
      best: document.getElementById("bestText"),
      danger: document.getElementById("dangerText"),
      overlay: document.getElementById("overlay"),
      modalTitle: document.getElementById("modalTitle"),
      modalText: document.getElementById("modalText"),
      start: document.getElementById("startBtn"),
      left: document.getElementById("leftBtn"),
      drop: document.getElementById("dropBtn"),
      right: document.getElementById("rightBtn"),
      restart: document.getElementById("restartBtn"),
      log: document.getElementById("log"),
      toast: document.getElementById("toast")
    };

    const W = 420;
    const H = 640;
    const WALL = 18;
    const FLOOR = 616;
    const SPAWN_Y = 48;
    const DANGER_Y = 112;
    const gravity = 980;
    const fruitTypes = [
      { name: "01", src: "assets/fruit-01.png", r: 16, score: 2, crop: [0, 0, 512, 503], visualScale: 1.06 },
      { name: "02", src: "assets/fruit-02.png", r: 21, score: 5, crop: [0, 0, 462, 512], visualScale: 1.08 },
      { name: "03", src: "assets/fruit-03.png", r: 26, score: 12, crop: [0, 0, 512, 452], visualScale: 1.06 },
      { name: "04", src: "assets/fruit-04.png", r: 32, score: 25, crop: [0, 0, 512, 440], visualScale: 1.04 },
      { name: "05", src: "assets/fruit-05.png", r: 38, score: 48, crop: [0, 0, 376, 512], visualScale: 1.12 },
      { name: "06", src: "assets/fruit-06.png", r: 46, score: 90, crop: [0, 0, 494, 512], visualScale: 1.06 },
      { name: "07", src: "assets/fruit-07.png", r: 50, score: 160, crop: [0, 0, 230, 512], visualScale: 1.45 },
      { name: "08", src: "assets/fruit-08.png", r: 60, score: 280, crop: [0, 0, 337, 512], visualScale: 1.16 },
      { name: "09", src: "assets/fruit-09.png", r: 72, score: 460, crop: [0, 0, 442, 512], visualScale: 1.1 },
      { name: "10", src: "assets/fruit-10.png", r: 84, score: 760, crop: [0, 0, 390, 512], visualScale: 1.13 },
      { name: "大卜卜", src: "assets/fruit-11.png", r: 98, score: 1200, crop: [0, 0, 398, 512], visualScale: 1.15 }
    ];

    const images = fruitTypes.map(type => {
      const img = new Image();
      img.src = type.src;
      return img;
    });

    const state = {
      fruits: [],
      particles: [],
      aimX: W / 2,
      nextLevel: 0,
      score: 0,
      merges: 0,
      maxLevel: 0,
      best: Number(localStorage.getItem("mergeBubuBestV1") || 0),
      last: 0,
      canDrop: true,
      running: false,
      gameOver: false,
      dangerTimer: 0,
      shake: 0,
      id: 1,
      loaded: false
    };

    Promise.all(images.map(img => img.decode().catch(() => undefined))).then(() => {
      state.loaded = true;
      drawNext();
    });

    function startGame() {
      state.fruits = [];
      state.particles = [];
      state.aimX = W / 2;
      state.nextLevel = randomDropLevel();
      state.score = 0;
      state.merges = 0;
      state.maxLevel = 0;
      state.canDrop = true;
      state.running = true;
      state.gameOver = false;
      state.dangerTimer = 0;
      state.shake = 0;
      ui.overlay.hidden = true;
      logLine("开局：先铺小果实，别把箱口堵住。");
      updateUi();
      drawNext();
    }

    function randomDropLevel() {
      const roll = Math.random();
      if (roll < .52) return 0;
      if (roll < .82) return 1;
      if (roll < .96) return 2;
      return 3;
    }

    function dropFruit() {
      if (!state.running || state.gameOver || !state.canDrop) return;
      const type = fruitTypes[state.nextLevel];
      const x = clamp(state.aimX, WALL + type.r, W - WALL - type.r);
      state.fruits.push({
        id: state.id++,
        level: state.nextLevel,
        x,
        y: SPAWN_Y,
        vx: rand(-15, 15),
        vy: 0,
        r: type.r,
        born: performance.now(),
        mergeLock: 0
      });
      state.nextLevel = randomDropLevel();
      state.canDrop = false;
      setTimeout(() => { state.canDrop = true; }, 420);
      drawNext();
    }

    function update(dt) {
      if (!state.running || state.gameOver) return;
      const subSteps = 3;
      const step = dt / subSteps;
      for (let i = 0; i < subSteps; i += 1) {
        integrate(step);
        solveCollisions();
        solveMerges();
      }
      updateDanger(dt);
      updateParticles(dt);
      state.shake = Math.max(0, state.shake - dt * 18);
      updateUi();
    }

    function integrate(dt) {
      for (const f of state.fruits) {
        f.mergeLock = Math.max(0, f.mergeLock - dt);
        f.vy += gravity * dt;
        f.x += f.vx * dt;
        f.y += f.vy * dt;
        f.vx *= .995;
        f.vy *= .999;

        if (f.x - f.r < WALL) {
          f.x = WALL + f.r;
          f.vx = Math.abs(f.vx) * .45;
        }
        if (f.x + f.r > W - WALL) {
          f.x = W - WALL - f.r;
          f.vx = -Math.abs(f.vx) * .45;
        }
        if (f.y + f.r > FLOOR) {
          f.y = FLOOR - f.r;
          f.vy = -Math.abs(f.vy) * .22;
          f.vx *= .94;
        }
      }
    }

    function solveCollisions() {
      for (let pass = 0; pass < 3; pass += 1) {
        for (let i = 0; i < state.fruits.length; i += 1) {
          for (let j = i + 1; j < state.fruits.length; j += 1) {
            const a = state.fruits[i];
            const b = state.fruits[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy) || .001;
            const minDist = a.r + b.r;
            if (dist >= minDist) continue;
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;
            const aMass = a.r * a.r;
            const bMass = b.r * b.r;
            const total = aMass + bMass;
            a.x -= nx * overlap * (bMass / total);
            a.y -= ny * overlap * (bMass / total);
            b.x += nx * overlap * (aMass / total);
            b.y += ny * overlap * (aMass / total);

            const rvx = b.vx - a.vx;
            const rvy = b.vy - a.vy;
            const velAlongNormal = rvx * nx + rvy * ny;
            if (velAlongNormal > 0) continue;
            const impulse = -1.1 * velAlongNormal / (1 / aMass + 1 / bMass);
            a.vx -= (impulse / aMass) * nx;
            a.vy -= (impulse / aMass) * ny;
            b.vx += (impulse / bMass) * nx;
            b.vy += (impulse / bMass) * ny;
          }
        }
      }
    }

    function solveMerges() {
      const used = new Set();
      const created = [];
      for (let i = 0; i < state.fruits.length; i += 1) {
        const a = state.fruits[i];
        if (used.has(a.id) || a.mergeLock > 0 || a.level >= fruitTypes.length - 1) continue;
        for (let j = i + 1; j < state.fruits.length; j += 1) {
          const b = state.fruits[j];
          if (used.has(b.id) || b.mergeLock > 0 || a.level !== b.level) continue;
          if (!shouldMerge(a, b)) continue;
          used.add(a.id);
          used.add(b.id);
          const nextLevel = a.level + 1;
          const type = fruitTypes[nextLevel];
          const nx = (a.x + b.x) / 2;
          const ny = (a.y + b.y) / 2;
          created.push({
            id: state.id++,
            level: nextLevel,
            x: clamp(nx, WALL + type.r, W - WALL - type.r),
            y: Math.min(ny, FLOOR - type.r),
            vx: (a.vx + b.vx) * .18,
            vy: -120,
            r: type.r,
            born: performance.now(),
            mergeLock: .06
          });
          state.score += type.score;
          state.merges += 1;
          state.maxLevel = Math.max(state.maxLevel, nextLevel);
          state.shake = Math.min(9, 3 + nextLevel * .5);
          burst(nx, ny, 18 + nextLevel * 2);
          logLine(`${fruitTypes[a.level].name} + ${fruitTypes[b.level].name} = ${type.name}`);
          if (nextLevel === fruitTypes.length - 1) toast("丰收！合成大卜卜！");
          else toast("成熟升级！");
          break;
        }
      }
      if (used.size) {
        state.fruits = state.fruits.filter(f => !used.has(f.id)).concat(created);
      }
    }

    function updateDanger(dt) {
      const now = performance.now();
      const risky = state.fruits.some(f => {
        const oldEnough = now - f.born > 1400;
        const slow = Math.abs(f.vx) + Math.abs(f.vy) < 90;
        return oldEnough && slow && f.y - f.r < DANGER_Y;
      });
      if (risky) state.dangerTimer += dt;
      else state.dangerTimer = Math.max(0, state.dangerTimer - dt * 1.2);
      if (state.dangerTimer > 2.2) endGame();
    }

    function getVisualSize(level, radius) {
      const type = fruitTypes[level];
      const img = images[level];
      const crop = type.crop || [0, 0, img.naturalWidth || 1, img.naturalHeight || 1];
      const aspect = crop[2] / crop[3];
      const longSide = radius * 2.28 * (type.visualScale || 1);
      return {
        w: (aspect >= 1 ? longSide : longSide * aspect) * (type.xScale || 1),
        h: (aspect >= 1 ? longSide / aspect : longSide) * (type.yScale || 1)
      };
    }

    function visuallyTouches(a, b) {
      const av = getVisualSize(a.level, a.r);
      const bv = getVisualSize(b.level, b.r);
      const rx = Math.max(1, (av.w + bv.w) * .54);
      const ry = Math.max(1, (av.h + bv.h) * .54);
      const nx = (a.x - b.x) / rx;
      const ny = (a.y - b.y) / ry;
      return nx * nx + ny * ny <= 1;
    }

    function shouldMerge(a, b) {
      if (visuallyTouches(a, b)) return true;

      const dx = Math.abs(a.x - b.x);
      const dy = Math.abs(a.y - b.y);
      const dist = Math.hypot(dx, dy);
      const touchRadius = a.r + b.r;
      if (dist <= touchRadius * 1.12) return true;

      const av = getVisualSize(a.level, a.r);
      const bv = getVisualSize(b.level, b.r);
      const closeEnough = dx <= touchRadius * 1.38 && dy <= Math.max(av.h, bv.h) * .62;
      return closeEnough;
    }

    function endGame() {
      if (state.gameOver) return;
      state.gameOver = true;
      state.running = false;
      state.best = Math.max(state.best, state.score);
      localStorage.setItem("mergeBubuBestV1", String(state.best));
      ui.overlay.hidden = false;
      ui.modalTitle.textContent = "收获箱爆仓了";
      ui.modalText.textContent = `本局收获 ${state.score} 分，最大合成到 ${fruitTypes[state.maxLevel].name}。重新开箱，再冲一次大卜卜。`;
      ui.start.textContent = "再收一局";
      updateUi();
    }

    function draw() {
      const ox = state.shake ? rand(-state.shake, state.shake) : 0;
      const oy = state.shake ? rand(-state.shake, state.shake) : 0;
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.translate(ox, oy);
      drawCrate();
      drawAim();
      for (const f of state.fruits) drawFruit(ctx, f.x, f.y, f.level, f.r);
      for (const p of state.particles) drawParticle(p);
      ctx.restore();
    }

    function drawCrate() {
      ctx.fillStyle = "#8f5424";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#b9783a";
      ctx.fillRect(WALL, 64, W - WALL * 2, FLOOR - 64);

      ctx.strokeStyle = "rgba(42,22,11,.16)";
      ctx.lineWidth = 2;
      for (let y = 84; y < FLOOR; y += 42) {
        ctx.beginPath();
        ctx.moveTo(WALL, y);
        ctx.lineTo(W - WALL, y);
        ctx.stroke();
      }
      for (let x = WALL + 52; x < W - WALL; x += 64) {
        ctx.beginPath();
        ctx.moveTo(x, 64);
        ctx.lineTo(x, FLOOR);
        ctx.stroke();
      }

      ctx.strokeStyle = "#2a160b";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(WALL, 64);
      ctx.lineTo(WALL, FLOOR);
      ctx.lineTo(W - WALL, FLOOR);
      ctx.lineTo(W - WALL, 64);
      ctx.stroke();

      ctx.strokeStyle = state.dangerTimer > 0 ? "#d94b38" : "rgba(255,230,111,.8)";
      ctx.lineWidth = 3;
      ctx.setLineDash([9, 8]);
      ctx.beginPath();
      ctx.moveTo(WALL, DANGER_Y);
      ctx.lineTo(W - WALL, DANGER_Y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = state.dangerTimer > 0 ? "#d94b38" : "#ffe66f";
      ctx.font = "900 13px Microsoft YaHei, sans-serif";
      ctx.fillText("箱口警戒线", WALL + 8, DANGER_Y - 8);
    }

    function drawAim() {
      if (!state.running || state.gameOver) return;
      const type = fruitTypes[state.nextLevel];
      const x = clamp(state.aimX, WALL + type.r, W - WALL - type.r);
      ctx.strokeStyle = "rgba(42,22,11,.32)";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 7]);
      ctx.beginPath();
      ctx.moveTo(x, 72);
      ctx.lineTo(x, FLOOR);
      ctx.stroke();
      ctx.setLineDash([]);
      drawFruit(ctx, x, SPAWN_Y, state.nextLevel, type.r, .9);
    }

    function drawFruit(context, x, y, level, radius, alpha = 1) {
      const img = images[level];
      const type = fruitTypes[level];
      context.save();
      context.globalAlpha = alpha;
      context.imageSmoothingEnabled = false;
      context.fillStyle = "rgba(42,22,11,.22)";
      context.beginPath();
      context.ellipse(x + radius * .1, y + radius * .86, radius * .74, radius * .18, 0, 0, Math.PI * 2);
      context.fill();

      if (img.complete && img.naturalWidth) {
        const crop = type.crop || [0, 0, img.naturalWidth, img.naturalHeight];
        const visual = getVisualSize(level, radius);
        const dw = visual.w;
        const dh = visual.h;
        context.drawImage(img, crop[0], crop[1], crop[2], crop[3], x - dw / 2, y - dh / 2, dw, dh);
      } else {
        context.fillStyle = "#ffe66f";
        context.fillRect(x - radius, y - radius, radius * 2, radius * 2);
      }
      context.restore();
    }

    function drawNext() {
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.imageSmoothingEnabled = false;
      nextCtx.fillStyle = "#ffe6a6";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.fillStyle = "rgba(42,22,11,.08)";
      for (let y = 0; y < nextCanvas.height; y += 16) nextCtx.fillRect(0, y, nextCanvas.width, 4);
      const type = fruitTypes[state.nextLevel];
      drawFruit(nextCtx, 65, 66, state.nextLevel, Math.min(type.r, 42));
    }

    function burst(x, y, count) {
      for (let i = 0; i < count; i += 1) {
        state.particles.push({
          x,
          y,
          vx: rand(-220, 220),
          vy: rand(-280, -60),
          size: rand(4, 9),
          life: rand(.35, .85)
        });
      }
    }

    function updateParticles(dt) {
      for (const p of state.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 420 * dt;
        p.life -= dt;
      }
      state.particles = state.particles.filter(p => p.life > 0);
    }

    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life * 1.4);
      ctx.fillStyle = "#ffe66f";
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.fillStyle = "#fff4c3";
      ctx.fillRect(p.x - p.size / 4, p.y - p.size / 4, p.size / 2, p.size / 2);
      ctx.restore();
    }

    function updateUi() {
      ui.score.textContent = state.score;
      ui.max.textContent = fruitTypes[state.maxLevel].name;
      ui.merge.textContent = state.merges;
      ui.best.textContent = state.best;
      if (state.dangerTimer > 0) {
        ui.danger.textContent = `爆仓倒计时 ${Math.max(0, 2.2 - state.dangerTimer).toFixed(1)}s`;
      } else {
        ui.danger.textContent = "箱口警戒线";
      }
    }

    function loop(now) {
      const dt = Math.min(.033, (now - state.last) / 1000 || 0);
      state.last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function pointerToAim(event) {
      const rect = canvas.getBoundingClientRect();
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      state.aimX = clamp((clientX - rect.left) * (W / rect.width), WALL + 16, W - WALL - 16);
    }

    function logLine(text) {
      const row = document.createElement("div");
      row.textContent = text;
      ui.log.prepend(row);
      while (ui.log.children.length > 6) ui.log.removeChild(ui.log.lastChild);
    }

    function toast(text) {
      ui.toast.textContent = text;
      ui.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => ui.toast.classList.remove("show"), 1300);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    canvas.addEventListener("pointermove", pointerToAim);
    canvas.addEventListener("pointerdown", event => {
      pointerToAim(event);
      dropFruit();
    });
    ui.drop.addEventListener("click", dropFruit);
    ui.left.addEventListener("click", () => {
      state.aimX = clamp(state.aimX - 24, WALL + 16, W - WALL - 16);
    });
    ui.right.addEventListener("click", () => {
      state.aimX = clamp(state.aimX + 24, WALL + 16, W - WALL - 16);
    });
    ui.restart.addEventListener("click", startGame);
    ui.start.addEventListener("click", startGame);
    document.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") state.aimX -= 18;
      else if (event.key === "ArrowRight") state.aimX += 18;
      else if (event.key === " ") dropFruit();
      else return;
      state.aimX = clamp(state.aimX, WALL + 16, W - WALL - 16);
      event.preventDefault();
    });

    updateUi();
    drawNext();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
